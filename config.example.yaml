# daily-agent 配置示例。复制为 config.yaml 后按需修改。
# 注意：config.yaml 与 .env 已在 .gitignore 中，绝不提交（安全红线，设计文档 §6.4）。
#
# v1 通过命令行 flag 传参，本文件是 v2 引入配置加载后的目标形状，先作参考。

# localhost 勾选页监听地址
addr: "127.0.0.1:8765"

# 站点数据目录（days/*.json、reports/*.md、index.json 的根）
site_dir: "./site"

# git 仓库根目录（上传时 commit 的位置；monorepo 即项目根）
repo_dir: "."

# 上传时是否执行 git push（无远端时保持 false，只本地 commit）
push: false

# ---- 以下为 v2 接真实数据源时启用 ----

# LLM 配置。API key 从环境变量 ANTHROPIC_API_KEY 读取，绝不写进本文件。
llm:
  provider: "anthropic"
  model: "claude-haiku-4-5" # 便宜可用 claude-haiku-4-5
  max_tokens: 1024

# 真实数据源路径
sources:
  # 要采集 git 提交的本地仓库列表
  git_repos:
    - "."
  # Obsidian vault 根目录
  obsidian_vault: ""
  # Zotero 数据库路径（只读打开，避开锁）
  zotero_sqlite: "" # 例如 C:/Users/you/Zotero/zotero.sqlite
